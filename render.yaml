services:
  # Backend Web Service
  - type: web
    name: housecup-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: housecup-db
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false
      - key: NODE_ENV
        value: production

  # Frontend Static Site
  - type: static
    name: housecup-frontend
    rootDir: ./
    publishPath: ./
    envVars:
      - key: BACKEND_URL
        value: https://housecup-backend.onrender.com

databases:
  - name: housecup-db
    plan: free
